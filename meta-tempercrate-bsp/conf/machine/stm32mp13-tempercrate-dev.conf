# Reuse the vendor (ST) machine settings as baseline
# (SoC, boot chain, kernel provider, storage layout, etc.).
require conf/machine/stm32mp13-disco.conf

# Give the machine its own identity.
MACHINE_NAME = "STM32MP13 TemperCrate DEV (based on Discovery)"
MACHINEOVERRIDES:append = ":stm32mp13-tempercrate-dev"

# Device Tree to build/deploy for this machine.
# "st/" is the subfolder under arch/arm/boot/dts/ in the kernel tree.
# The .dtb name must match the .dts provided via the kernel bbappend.
KERNEL_DEVICETREE = "st/stm32mp135f-tempercrate-dev.dtb"

# Enable FIT image support for this machine.
# In the ST BSP this automatically switches:
# - KERNEL_IMAGETYPE to fitImage
# - KERNEL_CLASSES to kernel-fitimage
# - extlinux handling to FIT-aware mode
MACHINE_FEATURES += "fit"

# Select the default DTB configuration used by the FIT image.
# Use the deployed DTB filename, without the source-tree path.
FIT_CONF_DEFAULT_DTB = "stm32mp135f-tempercrate-dev.dtb"

# Optional: use this to clearly differentiate artifacts
# when deploying images for multiple machines.
# IMAGE_BASENAME = "tempercrate-image-core-dev"