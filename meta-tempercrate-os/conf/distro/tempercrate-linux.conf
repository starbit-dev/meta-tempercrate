#@NAME: tempercrate-linux
#@DESCRIPTION: TemperCrate Linux based on ST Open Linux

# Base ST
require conf/distro/openstlinux-weston.conf
require conf/distro/include/tempercrate-sdk.inc

# Pin libgpiod major version (distro policy)
PREFERRED_VERSION_libgpiod = "1.6.%"

# =========================================================================
# DISTRO_VERSION from meta-tempercrate Git tag (exact match), else "0.0.0"
# =========================================================================
DISTRO = "tempercrate-linux"
DISTRO_NAME = "TemperCrate Linux"
DISTRO_CODENAME = "scarthgap"

# Default (development builds)
DISTRO_VERSION = "0.0.0"

# Use the exact Git tag of meta-tempercrate HEAD, if any; otherwise keep 0.0.0
DISTRO_VERSION := "${@(lambda repo: (__import__('os').popen('git -C %s describe --tags --exact-match 2>/dev/null' % __import__('shlex').quote(repo)).read().strip() or '0.0.0') if repo else '0.0.0')(d.getVar('TEMPERCRATE_META_REPO_DIR') or '')}"

# Set root filesystem size to 512 MiB.
# IMAGE_ROOTFS_SIZE is expressed in KiB:
#   256 MiB × 1024 KiB/MiB = 262144 KiB. 262144
# IMAGE_OVERHEAD_FACTOR is set to 1.0 to avoid automatic size inflation
# and keep the generated ext4 image close to the requested size.
# Rootfs size policy: apply only to TemperCrate rootfs images (not to ST initramfs images)
IMAGE_ROOTFS_SIZE:pn-tempercrate-image-debug = "262144"
IMAGE_OVERHEAD_FACTOR:pn-tempercrate-image-debug = "1.0"

IMAGE_ROOTFS_SIZE:pn-tempercrate-image-core = "262144"
IMAGE_OVERHEAD_FACTOR:pn-tempercrate-image-core = "1.0"

# ============================================================
# QA policy
# ============================================================
#
# Disable Y2038 (32bit time_t) QA warnings.
#
# Rationale:
# - Target is embedded STM32MP13 (32-bit userspace)
# - Expected device lifetime < 2038
# - Affects legacy utilities (e.g. v4l-utils, cec-tools)
# - Avoids excessive QA noise without impacting runtime behavior
#
INSANE_SKIP:append = " 32bit-time"

# Enable dev-friendly settings (root ssh, no password, etc.) Remener to remove for production
IMAGE_FEATURES:append = " debug-tweaks "

DISTRO_FEATURES:append = " rauc"

# HEADLESS + ETH + WIFI + BLE (fast-ish)
DISTRO_FEATURES:remove = "kde wayland opengl gstreamer pipewire pulseaudio "
MACHINE_FEATURES:remove = " splashscreen "

# Optional: reduce rootfs bloat
IMAGE_FEATURES:remove = "package-management"

# ------------------------------------------------------------------
# Fix ST EULA handling for custom machines
# ------------------------------------------------------------------
EULA_FILE_ST = "${OPENSTLINUX_BASE}/files/licenses/ST-Proprietary"
EULA_FILE_ST_MD5SUM = "7cb1e55a9556c7dd1a3cae09db9cc85f"

# Disable ST image license summary for custom TemperCrate images
INHERIT:remove = "st-image-license-summary"

